<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCF Confection – Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #1a1f1c;
        background: #f7f9f8;
      }

      header {
        background: #1a4d3e;
        color: #fff;
        padding: 2rem 1.5rem;
      }

      header h1 {
        margin: 0 0 0.25rem;
        font-size: 1.75rem;
      }

      main {
        max-width: 48rem;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      p {
        margin: 0 0 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>BCF Confection</h1>
      <p>Confectie op maat – demo pagina</p>
    </header>

    <main>
      <p>
        Welkom op de BCF Confection website. Gebruik de chatknop rechtsonder om
        vragen te stellen over onze diensten.
      </p>
      <p>
        Deze demo toont de chatbox met goedgekeurde snel-antwoorden, vrije
        tekstinvoer en doorverwijzing van uw vraag per e-mail.
      </p>
    </main>

    <!-- Chatbox mount point – loaded asynchronously via embed.js -->
    <div id="bcf-chat-root" class="bcf-chat-root"></div>
    <script src="../chatbox/embed.js" defer></script>
  </body>
</html>
